<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .content { padding: 16px; }
    .input-group { margin-bottom: 12px; }
    textarea {
      width: 100%;
      height: 80px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #e4e4e7;
      padding: 10px;
      font-size: 13px;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    textarea:focus { border-color: #7c3aed; }
    textarea::placeholder { color: #71717a; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn:hover { background: #6d28d9; }
    .btn-outline {
      background: transparent;
      border: 1px solid #27272a;
      color: #a1a1aa;
    }
    .btn-outline:hover { background: #18181b; color: #e4e4e7; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #27272a;
      text-align: center;
      font-size: 11px;
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="WiseQuery">
    <h1>WiseQuery</h1>
  </div>
  <div class="content">
    <div class="input-group">
      <textarea id="question" placeholder="AI에게 질문하세요..."></textarea>
    </div>
    <button class="btn" id="askBtn">WiseQuery에 질문하기</button>
    <button class="btn btn-outline" id="openBtn">WiseQuery 열기</button>
  </div>
  <div class="footer">웹 페이지에서 텍스트를 선택 → 우클릭 → "WiseQuery에 질문하기"</div>

  <script src="popup.js"></script>
</body>
</html>
